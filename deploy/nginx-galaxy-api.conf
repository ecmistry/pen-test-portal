# PenTest Portal — galaxy-api.tech
# Place in /etc/nginx/conf.d/ (e.g. as galaxy-api.conf) and reload nginx.
# After editing, run: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name galaxy-api.tech www.galaxy-api.tech;
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Allow long-running scan pages (tRPC polls while scan runs)
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
